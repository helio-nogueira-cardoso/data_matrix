name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: build dos 3 binarios em cada uma das 4 plataformas.
  # ---------------------------------------------------------------------------
  build:
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform_suffix: linux-x86_64
          - os: macos-latest
            label: macos-arm64
            platform_suffix: macos-arm64
          - os: macos-13
            label: macos-x86_64
            platform_suffix: macos-x86_64
          - os: windows-latest
            label: windows-x86_64
            platform_suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # =====================================================================
      # SETUP por plataforma
      # =====================================================================

      - name: linux | system deps
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          LIBDMTX=$(apt-cache search '^libdmtx0' | awk '{print $1}' | head -1)
          sudo apt-get install -y \
            python3 python3-venv python3-pip \
            "$LIBDMTX" libdmtx-dev \
            python3-gi python3-gi-cairo gir1.2-gtk-3.0

      - name: macos | system deps
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          brew update
          brew install libdmtx gtk+3 pygobject3 pkg-config

      - name: windows | setup msys2
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            autoconf
            automake
            libtool
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-python-pillow
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-opencv

      - name: windows | build libdmtx from source
        if: matrix.os == 'windows-latest'
        shell: "msys2 {0}"
        run: |
          set -e
          cd /tmp
          git clone --depth 1 https://github.com/dmtx/libdmtx.git
          cd libdmtx
          # MinGW exige -no-undefined em libtool para criar DLL.
          # A libdmtx upstream nao declara isso, entao patcheamos todo
          # Makefile.am que define libdmtx_la_LDFLAGS, adicionando a flag.
          echo "Localizando Makefile.am com libdmtx_la_LDFLAGS:"
          grep -lR "libdmtx_la_LDFLAGS" --include=Makefile.am || true
          find . -name "Makefile.am" -exec sed -i \
            's/^libdmtx_la_LDFLAGS\s*=\(.*\)/libdmtx_la_LDFLAGS =\1 -no-undefined/' {} \;
          echo "Apos patch:"
          grep -R "libdmtx_la_LDFLAGS" --include=Makefile.am || true
          autoreconf -fiv
          ./configure --prefix=/mingw64 --disable-static --enable-shared
          # Rede de seguranca: tambem injeta a flag via variavel automake
          # passada na linha de comando do make, para o caso de o patch nao
          # ter pegado todas as targets.
          make -j$(nproc) AM_LDFLAGS="-no-undefined"
          make install
          ls -l /mingw64/bin/libdmtx*.dll

      # =====================================================================
      # SETUP de Python: Linux/macOS via actions; Windows ja tem do MSYS2.
      # =====================================================================

      # actions/setup-python@v5 cria Python isolado, sem acesso ao
      # PyGObject do sistema. Para a GUI GTK3 funcionar, precisamos do
      # python3 do sistema (apt em Linux, brew em macOS) com venv que
      # herde site-packages.

      - name: linux | setup python venv with system PyGObject
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Usa python3 do apt (mesmo runtime em que python3-gi esta
          # instalado), com venv --system-site-packages para herdar gi.
          python3 --version
          python3 -m venv --system-site-packages .venv
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          .venv/bin/python -m pip install --upgrade pyinstaller
          .venv/bin/python -m pip install -r requirements.txt
          # Confirma que o modulo gi resolve para PyGObject do sistema.
          .venv/bin/python -c "import gi; print('gi from:', gi.__file__)"
          echo "${PWD}/.venv/bin" >> $GITHUB_PATH

      - name: macos | setup python venv with system PyGObject
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          # Usa o python3 do brew (mesmo prefix em que pygobject3 esta
          # instalado), nao o python do actions/setup-python.
          PYTHON3="$(brew --prefix)/bin/python3"
          echo "Using Python: $PYTHON3"
          "$PYTHON3" --version
          "$PYTHON3" -m venv --system-site-packages .venv
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          .venv/bin/python -m pip install --upgrade pyinstaller
          .venv/bin/python -m pip install -r requirements.txt
          # Confirma que o modulo gi resolve para PyGObject do brew.
          .venv/bin/python -c "import gi; print('gi from:', gi.__file__)"
          echo "${PWD}/.venv/bin" >> $GITHUB_PATH

      - name: install python deps (windows)
        if: matrix.os == 'windows-latest'
        shell: "msys2 {0}"
        run: |
          # numpy, opencv-python e Pillow ja vem do MSYS2 (mingw-w64-x86_64-*).
          # So instalamos via pip o que o MSYS2 nao traz: pyinstaller e
          # pylibdmtx. Evita o pip de tentar recompilar numpy do zero
          # (build de ninja falha em MinGW).
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade pyinstaller pylibdmtx

      # =====================================================================
      # BUILDS
      # =====================================================================

      - name: build pipeline (CLI) (linux/macos)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          python -m PyInstaller --clean --noconfirm pipeline.spec
          ls -la dist/

      - name: build pipeline (CLI) (windows)
        if: matrix.os == 'windows-latest'
        shell: "msys2 {0}"
        run: |
          python -m PyInstaller --clean --noconfirm pipeline.spec
          ls -la dist/

      - name: build pipeline_free (CLI) (linux/macos)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          python -m PyInstaller --clean --noconfirm pipeline_free.spec
          ls -la dist/

      - name: build pipeline_free (CLI) (windows)
        if: matrix.os == 'windows-latest'
        shell: "msys2 {0}"
        run: |
          python -m PyInstaller --clean --noconfirm pipeline_free.spec
          ls -la dist/

      - name: build PyAppArq (GUI) (linux/macos)
        if: matrix.os != 'windows-latest'
        shell: bash
        working-directory: PyAppArq
        run: |
          python -m PyInstaller --clean --noconfirm PyAppArq.spec
          ls -la dist/

      - name: build PyAppArq (GUI) (windows)
        if: matrix.os == 'windows-latest'
        shell: "msys2 {0}"
        working-directory: PyAppArq
        run: |
          python -m PyInstaller --clean --noconfirm PyAppArq.spec
          ls -la dist/

      # =====================================================================
      # PACKAGING e UPLOAD
      # =====================================================================

      - name: package artifacts (linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p out
          cp dist/pipeline       out/pipeline-${{ matrix.platform_suffix }}
          cp dist/pipeline_free  out/pipeline_free-${{ matrix.platform_suffix }}
          ( cd PyAppArq/dist && zip -r ../../out/PyAppArq-${{ matrix.platform_suffix }}.zip PyAppArq )
          ls -la out/

      - name: package artifacts (macos)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          mkdir -p out
          cp dist/pipeline       out/pipeline-${{ matrix.platform_suffix }}
          cp dist/pipeline_free  out/pipeline_free-${{ matrix.platform_suffix }}
          ( cd PyAppArq/dist && zip -r ../../out/PyAppArq-${{ matrix.platform_suffix }}.zip PyAppArq.app )
          ls -la out/

      - name: package artifacts (windows)
        if: matrix.os == 'windows-latest'
        shell: "msys2 {0}"
        run: |
          set -e
          mkdir -p out
          cp dist/pipeline.exe      out/pipeline-${{ matrix.platform_suffix }}.exe
          cp dist/pipeline_free.exe out/pipeline_free-${{ matrix.platform_suffix }}.exe
          ( cd PyAppArq/dist && zip -r ../../out/PyAppArq-${{ matrix.platform_suffix }}.zip PyAppArq )
          ls -la out/

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform_suffix }}
          path: out/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: coleta tudo e publica como Release no GitHub.
  # ---------------------------------------------------------------------------
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list collected artifacts
        run: ls -la dist/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
